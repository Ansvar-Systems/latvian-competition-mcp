# =============================================================================
# MCP GHCR Build — Build Docker image and push to GitHub Container Registry
# =============================================================================
#
# Triggered on push to main or dev, and on manual dispatch.
# - main: pushes :latest and :sha-XXXXXXX tags
# - dev:  pushes :dev and :sha-XXXXXXX tags
#
# Watchtower on the Hetzner prod server polls GHCR every 1 hour and
# automatically restarts containers when a new :latest image is detected.
# A workflow-level Watchtower kick is fired at the end of this job to
# trigger an immediate swap.
#
# DATABASE PROVISIONING:
# Handles three scenarios for getting data into the Docker image:
#   1. Dockerfile COPYs a .db file that's in the repo (normal case — no action)
#   2. Dockerfile COPYs a .db file but it's LFS/gitignored — downloads from release
#   3. Dockerfile has NO COPY data/ (fallback) — downloads from release and
#      patches the Dockerfile to inject the COPY + update the DB_PATH env var
#
# =============================================================================

name: Build and Push to GHCR

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: latvian-competition-mcp

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Provision database
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # --- Case 1 & 2: Dockerfile COPYs a .db file ---
          DB_FILES=$(grep -oP 'COPY\s+\K(data/\S+\.db)' Dockerfile 2>/dev/null || true)
          if [ -n "$DB_FILES" ]; then
            for DB_FILE in $DB_FILES; do
              if [ -f "$DB_FILE" ] && [ "$(wc -c < "$DB_FILE")" -gt 1024 ]; then
                echo "OK: $DB_FILE is valid ($(du -sh "$DB_FILE" | cut -f1))"
                continue
              fi

              # Detect LFS pointer or empty file
              if [ -f "$DB_FILE" ]; then
                if head -1 "$DB_FILE" 2>/dev/null | grep -q 'version https://git-lfs'; then
                  echo "WARN: $DB_FILE is an LFS pointer, not actual data"
                else
                  echo "WARN: $DB_FILE exists but is empty or too small ($(wc -c < "$DB_FILE") bytes)"
                fi
              else
                echo "WARN: $DB_FILE does not exist"
              fi

              # Download from GitHub Releases
              TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
              if [ -z "$TAG" ]; then
                echo "ERROR: $DB_FILE invalid and no GitHub Release available"
                exit 1
              fi

              echo "Downloading database.db.gz from release $TAG..."
              mkdir -p data
              if gh release download "$TAG" -p "database.db.gz" -D data/ 2>/dev/null; then
                gunzip -f data/database.db.gz
                echo "OK: Downloaded $(du -sh data/database.db | cut -f1) from release $TAG"
              else
                echo "ERROR: Could not download database.db.gz from release $TAG"
                exit 1
              fi
            done
            exit 0
          fi

          # --- Case 3: Dockerfile has NO COPY data/ ---
          TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null) || true
          if [ -z "$TAG" ]; then
            echo "No .db COPY in Dockerfile and no release — nothing to provision"
            exit 0
          fi

          echo "No .db COPY in Dockerfile but release $TAG exists — downloading and patching..."
          mkdir -p data
          if ! gh release download "$TAG" -p "database.db.gz" -D data/ 2>/dev/null; then
            echo "No database.db.gz asset in release — skipping"
            exit 0
          fi
          gunzip -f data/database.db.gz
          echo "Downloaded $(du -sh data/database.db | cut -f1) from release $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Kick Watchtower
        if: github.ref == 'refs/heads/main' && success()
        env:
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
        run: |
          if [ -z "$WATCHTOWER_TOKEN" ]; then
            echo "WATCHTOWER_HTTP_API_TOKEN not set; skipping kick (will swap on hourly poll)"
            exit 0
          fi
          curl -sS -m 60 -o /dev/null -w "%{http_code}\n" \
            -X POST https://watchtower.ansvar.eu/v1/update \
            -H "Authorization: Bearer ${WATCHTOWER_TOKEN}" || true

      - name: Summary
        if: always()
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/ansvar-systems/${{ env.IMAGE_NAME }}
          TAGS: ${{ steps.meta.outputs.tags }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          {
            echo "## GHCR Build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image | \`$IMAGE_REF\` |"
            echo "| Tags | $(echo "$TAGS" | tr '\n' ', ') |"
            echo "| Branch | \`$BRANCH\` |"
            echo "| Commit | \`$COMMIT\` |"
          } >> "$GITHUB_STEP_SUMMARY"
